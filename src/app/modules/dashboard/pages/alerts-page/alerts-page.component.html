
<div class="min-h-screen bg-gray-50 p-6 font-sans">
  <!-- Header Navigation -->
  <header class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
    <div class="flex items-center bg-gray-200 p-1 rounded-lg w-fit">
      <button class="px-4 py-1.5 rounded-md bg-white shadow-sm text-sm font-medium">Active Alerts</button>
      <button class="px-4 py-1.5 rounded-md text-gray-600 text-sm font-medium">Threshold Config</button>
      <button class="px-4 py-1.5 rounded-md text-gray-600 text-sm font-medium">Role Access</button>
    </div>

    <div class="flex items-center gap-3">
     
    <div class="flex flex-wrap">
      <label class="text-muted-foreground relative ">
        <div class="absolute left-2.5 top-2.5">
          <svg-icon src="./assets/icons/heroicons/outline/magnifying-glass.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
        </div>
        <input
          name="search"
          class="py-2 pl-8 pr-2 w-50 bg-zinc-100"
          placeholder="Search alerts..."
          type="text"
          value=""
          (input)="onSearchChange($event)" />
      </label>
    </div>
    <div class="flex gap-2 flex-grow">
         <label class="text-muted-foreground relative">
        <div class="absolute left-2.5 top-2.5">
          <svg-icon src="./assets/icons/tablericons/filter.svg" [svgClass]="'h-3 w-3'"> </svg-icon>
        </div>
      <select name="status" class="text-muted-foreground py-2 pl-8 pr-2 p-2" (change)="onStatusChange($event)">
        <option value="">All Status     </option>
        <option value="1">Active</option>
        <option value="2">Disabled</option>
        <option value="3">Pending</option>
      </select>
    </label>
    </div>
 
          
    </div>
  </header>
<div class="flex flex-col gap-4">
  <!-- Alerts List -->
    @for (alert of alerts; track alert.title) {
 <app-alert-card
  [alert]="alert"
  (onViewDetails)="handleView($event)"
  (onNotify)="handleNotify($event)">
</app-alert-card>
    }
</div>
