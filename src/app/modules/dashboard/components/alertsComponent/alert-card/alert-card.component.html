<div class="alert-card">
  <!-- Header Section -->
  <div class="header">
    <div class="left-section">
      <div class="icon-container" [ngClass]="alert.severity.toLowerCase()">
        <span class="material-symbols-outlined">report_problem</span>
      </div>
      
      <div class="title-area">
        <div class="title-row">
          <h2>{{ alert.title }}</h2>
          <span class="badge severity-badge" [ngClass]="alert.severity.toLowerCase()">{{ alert.severity }}</span>
          <span class="badge status-badge">{{ alert.status }}</span>
        </div>
        
        <div class="meta-row">
          <span class="meta-item">
            <i class="material-icons">location_on</i> {{ alert.location }}
          </span>
          <span class="meta-item">
            <i class="material-icons">schedule</i> {{ alert.timestamp }}
          </span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-outline" (click)="handleViewDetails()">View Details</button>
      <button class="btn-solid" (click)="handleNotify()">
        <i class="material-symbols-outlined">notifications</i> Notify
      </button>
    </div>
  </div>

  <hr class="divider">

  <!-- Info Grid Section -->
  <div class="info-grid">
    <div class="info-item">
      <label>Threshold Triggered</label>
      <p>{{ alert.threshold }}</p>
    </div>
    
    <div class="info-item">
      <label>Linked SOP</label>
      <p class="link-text">
        <i class="material-icons">description</i> {{ alert.sopName }}
      </p>
    </div>

    <div class="info-item">
      <label>Assigned To</label>
      <p>
        <i class="material-icons">group</i> {{ alert.assignedTo }}
      </p>
    </div>

    <div class="info-item">
      <label>Triggered By</label>
      <p>{{ alert.triggeredBy }}</p>
    </div>
  </div>
</div>
