<div class="card">
    <div class="card-header h-5 justify-between items-center">
       
        
            <h4 class="text-neutral-950 text-sm font-medium leading-5 text-left">Multi-Parameter Forecast Trends</h4>
       
        <div class="h-5 flex justify-start items-start gap-1.5 ms-auto">
            <div class="h-5 rounded-[5px] outline outline-[0.67px] outline-offset-[-0.67px] outline-black/10 text-[8px] text-xs flex items-center px-1 gap-1 text-blue-500">
               <mat-icon fontSet="material-symbols-outlined" class="">rainy</mat-icon>
               <span class="text-neutral-950"> Rainfall</span>
            </div>
            <div class="h-5 rounded-[5px] outline outline-[0.67px] outline-offset-[-0.67px] outline-black/10 text-[8px] text-xs flex items-center px-1 gap-1 text-orange-500">
               <mat-icon fontSet="material-symbols-outlined" class="">local_fire_department</mat-icon>
               <span class="text-neutral-950"> Temperature</span>
            </div>
            <div class="h-5 rounded-[5px] outline outline-[0.67px] outline-offset-[-0.67px] outline-black/10 text-[8px] text-xs flex items-center px-1 gap-1 text-purple-500">
               <mat-icon fontSet="material-symbols-outlined" class="">air</mat-icon>
               <span class="text-neutral-950"> AQI</span>
            </div>
           
        </div>
    </div>
    <div class="card-body p-3">
        <highcharts-chart
  [options]="chartOptions"
  style="width: 100%; height: 300px; display: block;">
</highcharts-chart>
    </div>
</div>
