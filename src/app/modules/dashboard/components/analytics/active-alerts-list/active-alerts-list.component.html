<div class="card p-3">
  <!-- Header Section -->
  <header class="card-header p-2">

    <h1 class="justify-start text-neutral-950 font-semibold text-sm leading-5">District wise Active Alert </h1>
    <h2 class="justify-start text-blue-500 text-sm font-semibold leading-5">{{ districtName }} {{ totalAlerts }} Alerts</h2>
  </header>

  <!-- Alert List -->
  <div class="alert-list">
    <div class="alert-item" *ngFor="let alert of alerts">
      <div class="alert-left-content">
        <!-- Status Dot -->
        <span class="status-dot" [style.backgroundColor]="alert.severityColor"></span>
        
        <div class="alert-details">
          <h3 class="alert-title text-neutral-950 text-xs font-medium leading-4">{{ alert.title }}</h3>
          
          <div class="meta-info">
            <span class="meta-item">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              {{ alert.location }}
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              {{ alert.timeAgo }}
            </span>
          </div>
        </div>
      </div>

      <div class="alert-actions">
        <!-- Status Badge -->
        <span class="badge" [ngClass]="alert.status.toLowerCase()">
          {{ alert.status }}
        </span>
        <!-- Action Link -->
        <button class="view-btn" (click)="onViewDetail(alert)">View</button>
      </div>
    </div>
  </div>
</div>
