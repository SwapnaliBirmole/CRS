<div class="card">
    <div class="card-header h-5 justify-between items-center">
    <div class="card-title">
        <div class="risk-distribution"> Risk Distribution </div>
    </div>
</div>
<div class="card-body">
 <div *ngIf="chartOptions">
  <highcharts-chart [Highcharts]="Highcharts" [options]="chartOptions"
    style="width: 100%; min-height: 250px; display: block; margin-left: 0;">
  </highcharts-chart>
</div>


<div class="mt-3">
  <ul style="list-style: none; padding-left: 0;">
    <li *ngFor="let serie of legendData; index as i;" class="d-flex justify-content-between p-1 rounded"
      [class.active-legend]="(serie.name === 'Active' && currentFilter === 'online') || (serie.name === 'Inactive' && currentFilter === 'offline') || (serie.name === 'Total' && currentFilter === 'all')"
      (click)="statusClicked.emit(serie.name)" style="cursor: pointer;">
      <label class="d-flex align-items-center" style="cursor: pointer;"><span
          [ngStyle]="{'width': '10px', 'height': '10px','border-radius': '25px', 'background-color': serie.color, 'display':'block'}"></span>
        &nbsp;{{serie.name}} </label><span class="me-2 fw-bold"> {{serie.y}} </span>
    </li>
  </ul>
</div>
</div>
</div>
