<div class="mb-4 flex justify-between items-end ">
  <div class="inline-block">
    <h3 class="text-slate-900 text-2xl font-bold leading-8 ">Hyperlocal Forecasts</h3>
    <div class="space-x-1 text-xs font-medium text-muted-foreground">
      <a href="" class="text-slate-600 text-sm font-normal leading-5">Ward-level AI-powered predictions with real-time accuracy metrics</a>
    </div>
  </div>
  <div class="inline-block space-x-4 items-end ">
    <div class="flex flex-wrap gap-2 items-end ">
       
      <select name="status" class="text-muted-foreground w-48! p-2 bg-zink" (change)="onStatusChange($event)">
        <option value="">All</option>
        <option value="1">Active</option>
        <option value="2">Disabled</option>
        <option value="3">Pending</option>
      </select>
    
    
    <div class="flex items-end">
      <label class="text-muted-foreground relative">
        <div class="absolute left-2.5 top-2.5">
          <svg-icon src="././assets/icons/heroicons/outline/magnifying-glass.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
        </div>
        <input
          name="search"
          class="py-2 pl-8 pr-2"
          placeholder="Search users"
          type="text"
          value=""
          (input)="onSearchChange($event)" />
      </label>
    </div>
   
  </div>
    <!-- <button
      class="flex-none rounded-md bg-muted px-4 py-2.5 text-xs font-semibold text-muted-foreground hover:text-foreground">
      Manage Bids
    </button>
    <button class="flex-none rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground">
      Manage Bids
    </button> -->
  </div>
</div>
