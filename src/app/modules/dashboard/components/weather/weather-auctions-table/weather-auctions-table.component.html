<div class="flex-col rounded-lg bg-background px-8 py-8 sm:flex-row">
  <div class="mb-4 flex items-center justify-between">
    <div class="flex-col items-center">
      <h3 class="text-md font-bold text-foreground">Ward-level Rainfall Forecast</h3>
      <!-- <span class="text-xs text-muted-foreground">Updated 37 minutes ago</span> -->
    </div>
    <!-- <button
      class="flex-none rounded-md bg-card px-4 py-2.5 text-xs font-semibold text-muted-foreground hover:bg-muted hover:text-foreground">
      History
    </button> -->
  </div>

  <div class="relative overflow-x-auto">
    <table class="w-full table-auto">
      <!--Table head-->
      <thead class="text-xs uppercase text-muted-foreground">
        <tr>
          <th class="py-3 text-left">Ward</th>
          <th class="py-3 text-right">24h Rainfall</th>
          <th class="py-3 text-right">Flood Risk</th>
          <th class="py-3 text-right">Lead Time</th>
          <th class="py-3 text-right">Actions</th>
        </tr>
      </thead>
      <!--end Table head-->
      <!--Table body-->
      <tbody>
        @for (auction of activeAuction; track auction) {
          <tr
            [auction]="auction"
            weather-auctions-table-item
          class="border-b border-dashed border-border hover:bg-card"></tr>
        }
      </tbody>
      <!--end::Table body-->
    </table>
  </div>
</div>
