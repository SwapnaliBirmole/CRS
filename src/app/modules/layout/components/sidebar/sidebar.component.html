<nav
  [ngClass]="menuService.showSideBar ? 'w-[210px] xl:w-[280px]' : 'w-[70px]'"
  class="bg-background hidden h-full flex-col justify-between pt-3 transition-all duration-300 lg:flex">
  <div class="overflow-hidden">
    <!-- Logo -->
    <div
      [ngClass]="menuService.showSideBar ? 'justify-between' : 'justify-center'"
      class="mx-4 mb-2 flex h-20 items-center border-b-[0.67px] border-orange-100/50">
      @if (menuService.showSideBar) {
        <div class="flex items-start gap-2">
          <a
            (click)="toggleSidebar()"
            class="flex cursor-pointer items-center justify-center ">
            <img src="assets/icons/logo-CRS.png"/> 
          </a>
          <div class="flex flex-col">
          <b class="crsName">
            {{ appJson.displayName }}</b>
            <span class="text-slate-500 text-xs font-medium leading-4">Disaster Management</span>
          </div>
        </div>
      }
      <button
        (click)="toggleSidebar()"
        class="text-muted-foreground/50 hover:text-muted-foreground flex items-center justify-center rounded-md transition-all duration-200 focus:outline-hidden"
        [ngClass]="{ 'rotate-180': !menuService.showSideBar }">
        <svg-icon src="assets/icons/heroicons/outline/xClose.svg" *ngIf="menuService.showSideBar"> </svg-icon>
         <div  *ngIf="!menuService.showSideBar"><img src="assets/icons/logo-CRS.png" /> </div>
      </button>
    </div>

    <!-- Menu Items -->
    <div
      class="scrollbar-thumb--sm scrollbar-track-rounded scrollbar-thin scrollbar-track-transparent scrollbar-thumb-card h-full overflow-auto" [ngClass]="menuService.showSideBar ? 'px-4' : 'px-2 svg-white'">
      <app-sidebar-menu></app-sidebar-menu>
      <app-system-info *ngIf="menuService.showSideBar"></app-system-info>
    </div>
  </div>

 
</nav>
